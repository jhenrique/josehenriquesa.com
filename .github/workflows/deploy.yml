name: Deploy para AWS S3 + CloudFront

on:
  push:
    branches:
      - main          # dispara a cada push na branch main

  workflow_dispatch:  # permite rodar manualmente pelo GitHub

jobs:
  deploy:
    name: Build e Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Baixa o código do repositório
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Configura as credenciais AWS usando os secrets do repositório
      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # 3. Sincroniza os arquivos com o S3
      # - HTML sem cache (sempre atualizado)
      # - CSS/JS/imagens com cache de 1 ano (melhor performance no CloudFront)
      - name: Upload HTML (sem cache)
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --exclude "*" \
            --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8" \
            --delete

      - name: Upload CSS
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --exclude "*" \
            --include "css/*.css" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload JavaScript
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --exclude "*" \
            --include "js/*.js" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload Imagens
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }} \
            --exclude "*" \
            --include "images/*" \
            --cache-control "public, max-age=31536000, immutable"

      # 4. Invalida o cache do CloudFront para entregar a versão mais recente
      - name: Invalidar cache do CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_ID }} \
            --paths "/*"

      # 5. Exibe o resultado no log do workflow
      - name: Deploy concluído
        run: |
          echo "✅ Deploy finalizado com sucesso!"
          echo "🌐 Site: https://josehenriquesa.com"
