<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark circle background -->
  <circle cx="16" cy="16" r="15.5" fill="#0a0a0a"/>

  <!-- Laptop screen body -->
  <rect x="5" y="7" width="22" height="14" rx="2" fill="#1a1a2e"/>

  <!-- Screen glass (inner display) -->
  <rect x="6.5" y="8.5" width="19" height="11" rx="1" fill="#0d0d1a"/>

  <!-- Code line 1 — orange keyword -->
  <rect x="8" y="11" width="8" height="1.5" rx="0.5" fill="#FF5C00"/>
  <!-- Code line 1 — gray value -->
  <rect x="17" y="11" width="5" height="1.5" rx="0.5" fill="#555577"/>

  <!-- Code line 2 — indented, blue string -->
  <rect x="10" y="13.5" width="4" height="1.5" rx="0.5" fill="#FF7A1A"/>
  <rect x="15" y="13.5" width="6" height="1.5" rx="0.5" fill="#4488cc"/>

  <!-- Code line 3 — orange -->
  <rect x="8" y="16" width="10" height="1.5" rx="0.5" fill="#FF5C00"/>

  <!-- Hinge accent line — orange -->
  <rect x="5" y="20.5" width="22" height="1" rx="0.5" fill="#FF5C00" opacity="0.9"/>

  <!-- Laptop base/keyboard -->
  <path d="M3 22 Q3 24 5 24 L27 24 Q29 24 29 22 Z" fill="#222222"/>

  <!-- Keyboard row dots -->
  <rect x="10" y="22.5" width="1.5" height="0.8" rx="0.3" fill="#444"/>
  <rect x="12.5" y="22.5" width="1.5" height="0.8" rx="0.3" fill="#444"/>
  <rect x="15" y="22.5" width="1.5" height="0.8" rx="0.3" fill="#444"/>
  <rect x="17.5" y="22.5" width="1.5" height="0.8" rx="0.3" fill="#444"/>
  <rect x="20" y="22.5" width="1.5" height="0.8" rx="0.3" fill="#444"/>

  <!-- Trackpad -->
  <rect x="13" y="24.2" width="6" height="3" rx="0.8" fill="#1a1a1a"/>
</svg>
